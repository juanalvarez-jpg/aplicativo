<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat OpenRouter</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .chat-container {
      width: 500px;
      background: white;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      color: #333;
    }

    textarea {
      width: 100%;
      height: 100px;
      padding: 10px;
      resize: none;
      border-radius: 5px;
      border: 1px solid #ccc;
      margin-top: 10px;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      background-color: #007bff;
      border: none;
      color: white;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #0056b3;
    }

    .response {
      margin-top: 20px;
      background: #f1f1f1;
      padding: 15px;
      border-radius: 5px;
      min-height: 80px;
      white-space: pre-wrap;
    }

    .loading {
      color: gray;
      font-style: italic;
    }
  </style>
</head>
<body>

  <div class="chat-container">
    <h2>Asistente IA</h2>

    <textarea id="message" placeholder="Escribe tu mensaje..."></textarea>

    <button onclick="sendMessage()">
      Enviar
    </button>

    <div class="response" id="response">
      La respuesta aparecerá aquí...
    </div>
  </div>

  <script>
    async function sendMessage() {
      const message = document.getElementById("message").value;
      const responseDiv = document.getElementById("response");

      if (!message.trim()) {
        alert("Por favor escribe un mensaje");
        return;
      }

      responseDiv.innerHTML = '<span class="loading">Generando respuesta...</span>';

      try {
        const response = await fetch("http://localhost:8000/ai-chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            message: message
          })
        });

        if (!response.ok) {
          throw new Error("Error en el servidor");
        }

        // Si el backend devuelve texto plano
        const data = await response.text();

        // Si devuelve JSON usa esto:
        // const data = await response.json();
        // responseDiv.innerText = data.response;

        responseDiv.innerText = data;

      } catch (error) {
        console.error(error);
        responseDiv.innerText = "Error al conectar con el servidor";
      }
    }
  </script>

</body>
</html>
